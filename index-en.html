
<style>
@import url('https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,500;0,600;0,700;1,500&family=Space+Mono:wght@500;600;700&display=swap');

* { box-sizing: border-box; margin: 0; padding: 0; }

/* ═══ Estudio oscuro — tokens (contraste legible) ═══ */
.app {
  --ink: #060605;
  --paper: #0e0d0b;
  --elev: #151311;
  --ridge: #1e1c19;
  --mist: rgba(255, 252, 245, 0.05);
  --mist-hover: rgba(255, 252, 245, 0.09);
  --line: rgba(255, 250, 240, 0.09);
  --line-strong: rgba(255, 250, 240, 0.16);
  --text: #faf7f2;
  --muted: #c9c4bd;
  --faint: #9a948c;
  --accent: #2ec4b6;
  --accent-dim: rgba(46, 196, 182, 0.15);
  --accent-glow: rgba(46, 196, 182, 0.35);
  --accent2: #ff9f1c;
  --grad: linear-gradient(125deg, #2ec4b6 0%, #06d6a0 45%, #118ab2 100%);
  --grad-soft: linear-gradient(135deg, rgba(46,196,182,0.2) 0%, rgba(17,138,178,0.12) 100%);
  --success: #06d6a0;
  --success-soft: rgba(6, 214, 160, 0.2);

  --color-background-primary: var(--ink);
  --color-background-secondary: var(--paper);
  --color-background-tertiary: var(--elev);
  --color-text-primary: var(--text);
  --color-text-secondary: var(--muted);
  --color-text-tertiary: var(--faint);
  --color-border-primary: var(--line-strong);
  --color-border-secondary: var(--line);
  --color-border-tertiary: rgba(255,250,240,0.04);
  --border-radius-lg: 14px;
  --border-radius-md: 10px;
  --accent-light: var(--accent-dim);
  --accent-border: rgba(46, 196, 182, 0.45);
  --accent-hover: #3dd9ca;

  font-family: 'Figtree', system-ui, sans-serif;
  font-weight: 500;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  text-rendering: optimizeLegibility;
  background: var(--ink);
  min-height: 540px;
  display: flex;
  flex-direction: column;
  border: 1px solid var(--line);
  border-radius: 18px;
  overflow: hidden;
  position: relative;
  box-shadow:
    0 0 0 1px rgba(0,0,0,0.4) inset,
    0 24px 80px rgba(0,0,0,0.55);
}

.app::before {
  content: '';
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse 90% 60% at 100% 0%, rgba(46, 196, 182, 0.07) 0%, transparent 55%),
    radial-gradient(ellipse 70% 50% at 0% 100%, rgba(255, 159, 28, 0.05) 0%, transparent 50%),
    url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 0;
}
.app > * { position: relative; z-index: 1; }

/* Titlebar */
.titlebar {
  display: flex;
  align-items: center;
  padding: 11px 18px;
  border-bottom: 1px solid var(--line);
  background: linear-gradient(180deg, rgba(255,250,240,0.03) 0%, transparent 100%);
  user-select: none;
  gap: 10px;
  flex-shrink: 0;
}

.dots { display: flex; gap: 7px; align-items: center; }
.dot { width: 11px; height: 11px; border-radius: 50%; transition: transform 0.2s ease, filter 0.2s; }
.dot:hover { transform: scale(1.08); filter: brightness(1.15); }
.dot-r { background: #ff5f57; box-shadow: 0 0 6px rgba(255,95,87,0.4); }
.dot-y { background: #febc2e; box-shadow: 0 0 6px rgba(254,188,46,0.35); }
.dot-g { background: #28c840; box-shadow: 0 0 6px rgba(40,200,64,0.35); }

.app-title {
  flex: 1;
  text-align: center;
  font-family: 'Space Mono', monospace;
  font-size: 11px;
  font-weight: 700;
  color: var(--muted);
  letter-spacing: 0.18em;
  text-transform: uppercase;
}

/* Link to Spanish version (separate file) */
.lang-link {
  flex-shrink: 0;
  font-family: 'Figtree', system-ui, sans-serif;
  font-size: 12px;
  font-weight: 700;
  padding: 8px 16px;
  border: 1px solid var(--accent-border);
  border-radius: 10px;
  background: var(--accent-dim);
  color: #c4fff7;
  text-decoration: none;
  white-space: nowrap;
  transition: color 0.15s, background 0.15s, border-color 0.15s, box-shadow 0.15s;
  box-shadow: 0 0 0 1px rgba(46,196,182,0.12) inset;
}
.lang-link:hover {
  color: #fff;
  background: rgba(46, 196, 182, 0.28);
  border-color: var(--accent);
  box-shadow: 0 4px 18px var(--accent-glow);
}
.lang-link:focus-visible {
  outline: 2px solid var(--accent);
  outline-offset: 2px;
}

.body { display: flex; flex: 1; min-height: 0; }

/* Sidebar */
.sidebar {
  width: 224px;
  flex-shrink: 0;
  border-right: 1px solid var(--line);
  display: flex;
  flex-direction: column;
  background: rgba(14, 13, 11, 0.6);
  backdrop-filter: blur(8px);
  overflow-y: auto;
}
.sidebar::-webkit-scrollbar { width: 4px; }
.sidebar::-webkit-scrollbar-thumb { background: var(--line-strong); border-radius: 4px; }

.sidebar-section {
  padding: 15px 14px;
  display: flex;
  flex-direction: column;
  gap: 11px;
  border-bottom: 1px solid var(--line);
}
.sidebar-section.sidebar-footer {
  border-bottom: none;
  margin-top: auto;
}

.section-label {
  font-family: 'Space Mono', monospace;
  font-size: 10px;
  font-weight: 700;
  color: var(--muted);
  letter-spacing: 0.14em;
  text-transform: uppercase;
  display: flex;
  align-items: center;
  gap: 8px;
}
.section-label::before {
  content: '';
  width: 18px;
  height: 2px;
  background: var(--grad);
  border-radius: 2px;
  flex-shrink: 0;
  opacity: 0.85;
}

/* Format */
.format-grid {
  display: flex;
  background: var(--mist);
  border: 1px solid var(--line);
  border-radius: 11px;
  padding: 4px;
  gap: 3px;
}
.format-btn {
  flex: 1;
  font-family: 'Space Mono', monospace;
  font-size: 10px;
  font-weight: 700;
  padding: 8px 0;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  color: var(--muted);
  background: transparent;
  transition: color 0.2s, background 0.2s, transform 0.15s;
  letter-spacing: 0.04em;
}
.format-btn:hover { color: var(--text); background: var(--mist-hover); }
.format-btn.active {
  background: var(--grad);
  color: #041312;
  box-shadow: 0 2px 14px var(--accent-glow), 0 1px 0 rgba(255,255,255,0.25) inset;
}

/* Quality */
.quality-wrap { display: flex; flex-direction: column; gap: 11px; }

.quality-display {
  display: flex;
  align-items: flex-end;
  gap: 12px;
}

.quality-num {
  font-family: 'Space Mono', monospace;
  font-size: 44px;
  font-weight: 700;
  line-height: 0.85;
  min-width: 68px;
  background: var(--grad);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  filter: drop-shadow(0 2px 8px rgba(0,0,0,0.45)) drop-shadow(0 0 24px rgba(46,196,182,0.35));
}

.quality-tag {
  font-family: 'Space Mono', monospace;
  font-size: 11px;
  font-weight: 600;
  color: var(--muted);
  line-height: 1.35;
  padding-bottom: 4px;
  max-width: 120px;
}

input[type=range] {
  width: 100%;
  height: 5px;
  -webkit-appearance: none;
  appearance: none;
  background: var(--ridge);
  border-radius: 6px;
  outline: none;
  cursor: pointer;
  border: 1px solid var(--line);
}
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 20px; height: 20px;
  background: var(--paper);
  border-radius: 50%;
  cursor: pointer;
  border: 2px solid var(--accent);
  box-shadow: 0 0 0 3px var(--accent-dim), 0 4px 12px rgba(0,0,0,0.4);
  transition: transform 0.15s, box-shadow 0.15s;
}
input[type=range]:active::-webkit-slider-thumb {
  transform: scale(1.12);
  box-shadow: 0 0 0 4px var(--accent-dim), 0 0 24px var(--accent-glow);
}

.preset-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
.preset-btn {
  font-family: 'Space Mono', monospace;
  font-size: 10px;
  font-weight: 600;
  padding: 8px 6px;
  background: transparent;
  border: 1px solid var(--line);
  border-radius: 7px;
  cursor: pointer;
  color: var(--muted);
  text-align: center;
  transition: border-color 0.15s, color 0.15s, background 0.15s;
  line-height: 1.45;
  white-space: nowrap;
}
.preset-btn:hover { border-color: var(--line-strong); color: var(--text); background: var(--mist); }
.preset-btn.active {
  background: var(--accent-dim);
  color: #e8fffb;
  font-weight: 700;
  border-color: var(--accent-border);
  box-shadow: 0 0 0 1px rgba(46,196,182,0.1);
}

/* Rename */
.rename-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  cursor: pointer;
}
.rename-header-label {
  font-size: 14px;
  font-weight: 600;
  color: var(--text);
  user-select: none;
}

.toggle-switch {
  position: relative;
  width: 34px; height: 19px;
  flex-shrink: 0;
  cursor: pointer;
}
.toggle-switch input { display: none; }
.toggle-track {
  position: absolute;
  inset: 0;
  border-radius: 20px;
  background: var(--ridge);
  border: 1px solid var(--line);
  transition: background 0.25s, border-color 0.25s, box-shadow 0.25s;
}
.toggle-track::after {
  content: '';
  position: absolute;
  left: 3px; top: 3px;
  width: 13px; height: 13px;
  border-radius: 50%;
  background: var(--muted);
  transition: transform 0.28s cubic-bezier(.34,1.56,.64,1), background 0.25s;
  box-shadow: 0 2px 6px rgba(0,0,0,0.35);
}
.toggle-switch input:checked ~ .toggle-track {
  background: linear-gradient(135deg, #1a6b63, #2ec4b6);
  border-color: rgba(46,196,182,0.5);
  box-shadow: 0 0 16px var(--accent-glow);
}
.toggle-switch input:checked ~ .toggle-track::after {
  transform: translateX(15px);
  background: #fff;
}

.rename-fields { display: flex; flex-direction: column; gap: 7px; }
.rename-row { display: flex; align-items: center; gap: 7px; }
.rename-label {
  font-size: 11px;
  font-weight: 600;
  color: var(--muted);
  font-family: 'Space Mono', monospace;
  min-width: 40px;
}
.rename-input {
  flex: 1;
  height: 30px;
  font-family: 'Space Mono', monospace;
  font-size: 12px;
  font-weight: 500;
  padding: 0 10px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: var(--mist);
  color: var(--text);
  outline: none;
  transition: border-color 0.15s, box-shadow 0.15s;
}
.rename-input::placeholder { color: var(--faint); opacity: 0.95; }
.rename-input:focus {
  border-color: var(--accent-border);
  box-shadow: 0 0 0 3px var(--accent-dim);
}

.rename-preview {
  font-family: 'Space Mono', monospace;
  font-size: 10px;
  font-weight: 500;
  color: var(--muted);
  padding: 7px 10px;
  background: var(--ink);
  border: 1px dashed var(--line-strong);
  border-radius: 6px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

/* Resize */
.resize-opts { display: flex; flex-direction: column; gap: 3px; }
.resize-opt {
  display: flex;
  align-items: center;
  gap: 9px;
  padding: 8px 10px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 13px;
  font-weight: 600;
  color: var(--muted);
  border: 1px solid transparent;
  transition: background 0.15s, color 0.15s, border-color 0.15s;
  user-select: none;
}
.resize-opt:hover { background: var(--mist); color: var(--text); }
.resize-opt.active {
  background: var(--accent-dim);
  border-color: rgba(46,196,182,0.35);
  color: #b8fff5;
  font-weight: 700;
}
.resize-opt input[type=radio] { accent-color: var(--accent); width: 13px; height: 13px; flex-shrink: 0; }

.max-width-row {
  display: flex;
  align-items: center;
  gap: 7px;
  padding: 2px 10px 5px;
}
.max-width-row input[type=number] {
  width: 68px; height: 30px;
  font-family: 'Space Mono', monospace;
  font-size: 12px;
  font-weight: 600;
  padding: 0 9px;
  border: 1px solid var(--line);
  border-radius: 7px;
  background: var(--mist);
  color: var(--text);
  outline: none;
  transition: border-color 0.15s;
  -moz-appearance: textfield;
}
.max-width-row input[type=number]:focus { border-color: var(--accent-border); }
.max-width-row input[type=number]::-webkit-inner-spin-button,
.max-width-row input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }
.max-width-row .unit { font-size: 11px; font-weight: 600; color: var(--muted); font-family: 'Space Mono', monospace; }

/* Chips */
.formats-chips { display: flex; flex-wrap: wrap; gap: 5px; }
.format-chip {
  font-family: 'Space Mono', monospace;
  font-size: 9px;
  font-weight: 700;
  padding: 4px 8px;
  border-radius: 4px;
  background: var(--mist);
  border: 1px solid var(--line);
  color: var(--muted);
  letter-spacing: 0.04em;
}
.heic-note { font-size: 10px; font-weight: 500; color: var(--muted); line-height: 1.55; font-style: italic; }

/* Main */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  padding: 20px;
  gap: 14px;
  min-width: 0;
}

@property --border-angle {
  syntax: '<angle>';
  initial-value: 0deg;
  inherits: false;
}

@keyframes rotate-border {
  to { --border-angle: 360deg; }
}
@keyframes gradient-flow {
  0%, 100% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
}
@keyframes shimmer {
  from { transform: translateX(-100%); }
  to { transform: translateX(200%); }
}
@keyframes slideIn {
  from { opacity: 0; transform: translateY(-6px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes spin { to { transform: rotate(360deg); } }
@keyframes pulse-glow {
  0%, 100% { box-shadow: 0 0 6px var(--success-soft); }
  50% { box-shadow: 0 0 14px rgba(6,214,160,0.45); }
}

@media (prefers-reduced-motion: reduce) {
  .drop-zone::after { animation: none !important; }
  .btn-convert { animation: none !important; }
  .file-item { animation: none !important; }
  .progress-bar-fill::after { animation: none !important; }
  .status-done { animation: none !important; }
}

.drop-zone {
  position: relative;
  border-radius: 16px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 40px 28px;
  gap: 12px;
  cursor: pointer;
  min-height: 168px;
  background: var(--grad-soft);
  transition: background 0.35s ease, transform 0.25s ease;
}

.drop-zone::before {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 16px;
  padding: 1px;
  background: var(--line-strong);
  -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
  -webkit-mask-composite: xor;
  mask-composite: exclude;
  pointer-events: none;
  transition: opacity 0.35s;
}

.drop-zone::after {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 16px;
  padding: 2px;
  background: conic-gradient(from var(--border-angle),
    transparent 0%,
    #2ec4b6 18%,
    #06d6a0 38%,
    #ff9f1c 52%,
    #118ab2 72%,
    transparent 88%
  );
  -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
  -webkit-mask-composite: xor;
  mask-composite: exclude;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.35s;
  animation: rotate-border 3s linear infinite;
  animation-play-state: paused;
}

.drop-zone:hover,
.drop-zone.dragging {
  background: linear-gradient(145deg, rgba(46,196,182,0.12) 0%, rgba(17,138,178,0.08) 100%);
}
.drop-zone:hover::before,
.drop-zone.dragging::before { opacity: 0; }
.drop-zone:hover::after,
.drop-zone.dragging::after {
  opacity: 1;
  animation-play-state: running;
}

.drop-icon {
  width: 60px; height: 60px;
  border-radius: 16px;
  display: flex; align-items: center; justify-content: center;
  position: relative;
  overflow: hidden;
  background: var(--mist);
  border: 1px solid var(--line);
  transition: border-color 0.3s, box-shadow 0.3s, transform 0.3s;
}
.drop-icon::before {
  content: '';
  position: absolute;
  inset: 0;
  background: var(--grad);
  opacity: 0;
  transition: opacity 0.35s;
}
.drop-icon svg {
  width: 26px; height: 26px;
  stroke: var(--muted);
  fill: none; stroke-width: 2.1;
  transition: stroke 0.3s, transform 0.35s cubic-bezier(.34,1.56,.64,1);
  position: relative; z-index: 1;
}
.drop-zone:hover .drop-icon,
.drop-zone.dragging .drop-icon {
  border-color: rgba(46,196,182,0.45);
  box-shadow: 0 8px 32px rgba(46,196,182,0.2), 0 0 0 1px rgba(46,196,182,0.15);
  transform: translateY(-2px);
}
.drop-zone:hover .drop-icon::before,
.drop-zone.dragging .drop-icon::before { opacity: 1; }
.drop-zone:hover .drop-icon svg { stroke: #041312; transform: translateY(-3px); }
.drop-zone.dragging .drop-icon svg { stroke: #041312; transform: scale(1.08) translateY(-2px); }

.drop-label {
  font-size: 16px;
  font-weight: 700;
  color: var(--text);
  letter-spacing: -0.02em;
}
.drop-zone:hover .drop-label,
.drop-zone.dragging .drop-label {
  background: var(--grad);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.drop-sub {
  font-size: 12px;
  font-weight: 500;
  color: var(--muted);
  font-family: 'Figtree', system-ui, sans-serif;
  letter-spacing: 0.01em;
}

/* Progress */
.progress-bar-wrap {
  height: 4px;
  background: var(--ridge);
  border-radius: 4px;
  overflow: hidden;
  display: none;
  border: 1px solid var(--line);
}
.progress-bar-fill {
  height: 100%;
  background: var(--grad);
  border-radius: 4px;
  transition: width 0.35s ease;
  position: relative;
  overflow: hidden;
}
.progress-bar-fill::after {
  content: '';
  position: absolute;
  inset: 0;
  width: 45%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.45), transparent);
  animation: shimmer 1.2s ease-in-out infinite;
}

/* File list */
.file-list {
  flex: 1;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 6px;
  max-height: 200px;
}
.file-list::-webkit-scrollbar { width: 4px; }
.file-list::-webkit-scrollbar-track { background: transparent; }
.file-list::-webkit-scrollbar-thumb { background: var(--line-strong); border-radius: 4px; }

.file-item {
  display: flex;
  align-items: center;
  gap: 9px;
  padding: 10px 12px 10px 14px;
  border-radius: 10px;
  border: 1px solid var(--line);
  background: var(--mist);
  font-size: 13px;
  font-weight: 500;
  animation: slideIn 0.28s cubic-bezier(.22,1,.36,1);
  position: relative;
  overflow: hidden;
  transition: border-color 0.25s, background 0.25s;
}
.file-item::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 3px;
  border-radius: 10px 0 0 10px;
  background: var(--line-strong);
  transition: background 0.3s, box-shadow 0.3s;
}
.file-item.is-processing {
  border-color: rgba(46,196,182,0.35);
  background: rgba(46,196,182,0.06);
}
.file-item.is-processing::before {
  background: var(--grad);
  box-shadow: 2px 0 12px var(--accent-glow);
}
.file-item.is-done {
  border-color: rgba(6,214,160,0.35);
  background: var(--success-soft);
}
.file-item.is-done::before {
  background: var(--success);
  box-shadow: 2px 0 10px rgba(6,214,160,0.4);
}

.file-ext {
  font-family: 'Space Mono', monospace;
  font-size: 9px;
  font-weight: 700;
  padding: 4px 7px;
  border-radius: 4px;
  min-width: 30px;
  text-align: center;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  background: var(--ink);
  color: var(--muted);
  border: 1px solid var(--line);
}
.file-name {
  flex: 1;
  color: var(--text);
  font-weight: 600;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  min-width: 0;
}
.file-arrow { color: var(--muted); font-family: 'Space Mono', monospace; font-size: 11px; font-weight: 600; flex-shrink: 0; }
.file-newname {
  font-family: 'Space Mono', monospace;
  font-size: 11px;
  font-weight: 600;
  color: #ffc46d;
  white-space: nowrap;
  flex-shrink: 0;
  max-width: 110px;
  overflow: hidden;
  text-overflow: ellipsis;
}
.file-size { color: var(--muted); font-family: 'Space Mono', monospace; font-size: 11px; font-weight: 500; flex-shrink: 0; }
.file-status { width: 20px; height: 20px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }

.status-pending {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--muted);
  border: 1px solid var(--line-strong);
}
.status-done {
  width: 18px; height: 18px;
  background: var(--success);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  color: #041312; font-size: 10px; font-weight: 800;
  animation: pulse-glow 2.2s ease-in-out infinite;
}
.status-processing {
  width: 15px; height: 15px;
  border: 2px solid rgba(46,196,182,0.2);
  border-top-color: var(--accent);
  border-right-color: #118ab2;
  border-radius: 50%;
  animation: spin 0.55s linear infinite;
}

/* Footer */
.footer-bar {
  display: flex;
  align-items: center;
  gap: 10px;
  padding-top: 14px;
  border-top: 1px solid var(--line);
  flex-wrap: wrap;
}

.stats {
  font-family: 'Space Mono', monospace;
  font-size: 11px;
  font-weight: 600;
  color: var(--muted);
  flex: 1;
  min-width: 100px;
}

.btn-clear {
  font-family: 'Space Mono', monospace;
  font-size: 11px;
  font-weight: 600;
  padding: 8px 14px;
  border: 1px solid var(--line);
  border-radius: 9px;
  background: transparent;
  color: var(--muted);
  cursor: pointer;
  transition: background 0.15s, color 0.15s, border-color 0.15s;
}
.btn-clear:hover {
  background: var(--mist-hover);
  color: var(--text);
  border-color: var(--line-strong);
}

.dl-mode {
  display: flex;
  background: var(--mist);
  border: 1px solid var(--line);
  border-radius: 9px;
  padding: 3px;
  gap: 3px;
}
.dl-mode-btn {
  font-family: 'Space Mono', monospace;
  font-size: 10px;
  font-weight: 700;
  padding: 7px 11px;
  border: none;
  border-radius: 7px;
  cursor: pointer;
  color: var(--muted);
  background: transparent;
  transition: color 0.15s, background 0.15s;
  white-space: nowrap;
}
.dl-mode-btn:hover { color: var(--text); }
.dl-mode-btn.active {
  background: var(--elev);
  color: #9ff7eb;
  box-shadow: 0 1px 0 rgba(255,250,240,0.06) inset;
}

.btn-convert {
  font-family: 'Space Mono', monospace;
  font-size: 12px;
  font-weight: 700;
  padding: 10px 22px;
  border: none;
  border-radius: 10px;
  background: var(--grad);
  background-size: 200% 200%;
  color: #021a18;
  cursor: pointer;
  transition: transform 0.2s, box-shadow 0.2s, filter 0.2s;
  letter-spacing: 0.05em;
  box-shadow: 0 4px 20px var(--accent-glow), 0 1px 0 rgba(255,255,255,0.35) inset;
  animation: gradient-flow 5s ease infinite;
}
.btn-convert:hover:not(:disabled) {
  transform: translateY(-2px);
  box-shadow: 0 8px 28px rgba(46,196,182,0.45), 0 0 40px rgba(17,138,178,0.15);
  filter: brightness(1.05);
}
.btn-convert:active { transform: translateY(0); }
.btn-convert:disabled {
  opacity: 0.5;
  color: rgba(2,26,24,0.75);
  cursor: not-allowed;
  transform: none;
  box-shadow: none;
  filter: grayscale(0.15);
  animation: none;
}

input[type=file] { display: none; }
</style>

<div class="app">
  <div class="titlebar">
    <div class="dots">
      <div class="dot dot-r"></div>
      <div class="dot dot-y"></div>
      <div class="dot dot-g"></div>
    </div>
    <div class="app-title" id="appTitle">WEBP — CONVERTER</div>
    <a href="index.html" class="lang-link" hreflang="es">Español</a>
  </div>

  <div class="body">
    <div class="sidebar">

      <!-- FORMAT -->
      <div class="sidebar-section">
        <div class="section-label">Output format</div>
        <div class="format-grid">
          <button type="button" class="format-btn active" onclick="setFormat('webp', this)">WebP</button>
          <button type="button" class="format-btn" onclick="setFormat('png', this)">PNG</button>
          <button type="button" class="format-btn" onclick="setFormat('jpg', this)">JPG</button>
        </div>
      </div>

      <!-- QUALITY -->
      <div class="sidebar-section">
        <div class="section-label">Quality</div>
        <div class="quality-wrap">
          <div class="quality-display">
            <span class="quality-num" id="qualVal">82</span>
            <span class="quality-tag" id="qualLabel">web — ideal</span>
          </div>
          <input type="range" id="qualSlider" min="10" max="100" step="1" value="82">
          <div class="preset-grid">
            <button type="button" class="preset-btn" onclick="setQual(60, this)">60 — light</button>
            <button type="button" class="preset-btn active" onclick="setQual(82, this)">82 — web</button>
            <button type="button" class="preset-btn" onclick="setQual(90, this)">90 — high</button>
            <button type="button" class="preset-btn" onclick="setQual(100, this)">100 — max</button>
          </div>
        </div>
      </div>

      <!-- RENAME -->
      <div class="sidebar-section">
        <div class="section-label">Rename</div>
        <label class="rename-header">
          <span class="rename-header-label">Rename files</span>
          <span class="toggle-switch">
            <input type="checkbox" id="renameToggle" onchange="toggleRename()" checked>
            <span class="toggle-track"></span>
          </span>
        </label>
        <div id="renameFields" class="rename-fields">
          <div class="rename-row">
            <span class="rename-label">Prefix</span>
            <input class="rename-input" type="text" id="prefixInput" placeholder="e.g. photo_" oninput="renderList()">
          </div>
          <div class="rename-row">
            <span class="rename-label">Start at</span>
            <input class="rename-input" type="number" id="startNum" value="1" min="0" style="width:60px;flex:none;" oninput="renderList()">
          </div>
          <div class="rename-preview" id="renamePreview">1.webp, 2.webp, 3.webp…</div>
        </div>
      </div>

      <!-- RESIZE -->
      <div class="sidebar-section">
        <div class="section-label">Resize</div>
        <div class="resize-opts">
          <label class="resize-opt active" id="opt-none">
            <input type="radio" name="resize" value="none" checked onchange="setResize('none')">
            <span>Original size</span>
          </label>
          <label class="resize-opt" id="opt-maxw">
            <input type="radio" name="resize" value="maxw" onchange="setResize('maxw')">
            <span>Max width</span>
          </label>
          <div class="max-width-row" id="maxwRow" style="display:none">
            <input type="number" id="maxWidth" value="1920" min="100" max="9999">
            <span class="unit">px</span>
          </div>
          <label class="resize-opt" id="opt-50">
            <input type="radio" name="resize" value="50" onchange="setResize('50')">
            <span>50% of original</span>
          </label>
        </div>
      </div>

      <!-- ACCEPTED FORMATS -->
      <div class="sidebar-section sidebar-footer">
        <div class="section-label">Accepted formats</div>
        <div class="formats-chips">
          <span class="format-chip">JPG</span>
          <span class="format-chip">PNG</span>
          <span class="format-chip">GIF</span>
          <span class="format-chip">BMP</span>
          <span class="format-chip">TIFF</span>
          <span class="format-chip">AVIF</span>
          <span class="format-chip">HEIC*</span>
        </div>
        <div class="heic-note">*HEIC may need prior conversion on macOS</div>
      </div>

    </div>

    <div class="main">
      <input type="file" id="fileInput" multiple accept="image/*">

      <div class="drop-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
        <div class="drop-icon">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        </div>
        <span class="drop-label">Drop images here</span>
        <span class="drop-sub">or click to browse</span>
      </div>

      <div class="progress-bar-wrap" id="progressWrap">
        <div class="progress-bar-fill" id="progressFill" style="width:0%"></div>
      </div>

      <div class="file-list" id="fileList"></div>

      <div class="footer-bar">
        <span class="stats" id="statsLabel">0 images</span>
        <button type="button" class="btn-clear" onclick="clearAll()">Clear</button>
        <div class="dl-mode">
          <button type="button" class="dl-mode-btn active" onclick="setDlMode('individual', this)">↓ 1:1</button>
          <button type="button" class="dl-mode-btn" onclick="setDlMode('zip', this)">↓ ZIP</button>
        </div>
        <button type="button" class="btn-convert" id="convertBtn" onclick="startConvert()" disabled>Convert →</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script>
let files = [];
let quality = 82;
let resizeMode = 'none';
let outputFormat = 'webp';
let renameEnabled = true;
let downloadMode = 'individual';

const qualSlider = document.getElementById('qualSlider');
const qualVal = document.getElementById('qualVal');
const qualLabel = document.getElementById('qualLabel');
const fileList = document.getElementById('fileList');
const statsLabel = document.getElementById('statsLabel');
const convertBtn = document.getElementById('convertBtn');
const dropZone = document.getElementById('dropZone');
const progressWrap = document.getElementById('progressWrap');
const progressFill = document.getElementById('progressFill');

function getExt() { return outputFormat; }
function getMime() {
  if (outputFormat === 'jpg') return 'image/jpeg';
  if (outputFormat === 'png') return 'image/png';
  return 'image/webp';
}

function getNewName(i) {
  if (!renameEnabled) return null;
  const prefix = document.getElementById('prefixInput').value;
  const start = parseInt(document.getElementById('startNum').value) || 1;
  return prefix + (start + i) + '.' + getExt();
}

function updatePreview() {
  const preview = document.getElementById('renamePreview');
  const prefix = document.getElementById('prefixInput').value;
  const start = parseInt(document.getElementById('startNum').value) || 1;
  const ext = getExt();
  preview.textContent = `${prefix}${start}.${ext}, ${prefix}${start+1}.${ext}, ${prefix}${start+2}.${ext}…`;
}

function toggleRename() {
  renameEnabled = document.getElementById('renameToggle').checked;
  document.getElementById('renameFields').style.opacity = renameEnabled ? '1' : '0.55';
  document.getElementById('renameFields').style.pointerEvents = renameEnabled ? '' : 'none';
  renderList();
}

function updateAppTitle() {
  const titles = { webp: 'WEBP — CONVERTER', png: 'PNG — CONVERTER', jpg: 'JPG — CONVERTER' };
  document.getElementById('appTitle').textContent = titles[outputFormat];
}

function refreshQualityLabel() {
  const q = quality;
  if (q <= 65) qualLabel.textContent = 'light';
  else if (q <= 85) qualLabel.textContent = 'web — ideal';
  else if (q <= 95) qualLabel.textContent = 'high quality';
  else qualLabel.textContent = 'lossless';
}

function setFormat(fmt, btn) {
  outputFormat = fmt;
  document.querySelectorAll('.format-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  updateAppTitle();
  updatePreview();
  renderList();
}

function updateSliderGradient() {
  const pct = ((quality - 10) / 90) * 100;
  qualSlider.style.background = `linear-gradient(to right, #2ec4b6 0%, #06d6a0 ${pct}%, #1e1c19 ${pct}%)`;
}

qualSlider.addEventListener('input', () => {
  quality = parseInt(qualSlider.value);
  qualVal.textContent = quality;
  document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
  refreshQualityLabel();
  updateSliderGradient();
});

function setQual(q, btn) {
  quality = q;
  qualSlider.value = q;
  qualVal.textContent = q;
  document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  refreshQualityLabel();
  updateSliderGradient();
}

function setResize(val) {
  resizeMode = val;
  document.querySelectorAll('.resize-opt').forEach(o => o.classList.remove('active'));
  document.getElementById('opt-' + (val === 'none' ? 'none' : val === 'maxw' ? 'maxw' : '50')).classList.add('active');
  document.getElementById('maxwRow').style.display = val === 'maxw' ? 'flex' : 'none';
}

function setDlMode(mode, btn) {
  downloadMode = mode;
  document.querySelectorAll('.dl-mode-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragging'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragging'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('dragging');
  addFiles([...e.dataTransfer.files]);
});
document.getElementById('fileInput').addEventListener('change', e => addFiles([...e.target.files]));
document.getElementById('prefixInput').addEventListener('input', () => { updatePreview(); renderList(); });
document.getElementById('startNum').addEventListener('input', () => { updatePreview(); renderList(); });

function addFiles(newFiles) {
  const imgFiles = newFiles.filter(f => f.type.startsWith('image/'));
  imgFiles.forEach(f => {
    if (!files.find(x => x.name === f.name && x.size === f.size)) {
      files.push({ file: f, status: 'pending', id: Date.now() + Math.random() });
    }
  });
  renderList();
  updateStats();
}

function fmtSize(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1024*1024) return (bytes/1024).toFixed(1) + ' KB';
  return (bytes/1024/1024).toFixed(1) + ' MB';
}

function getOrigExt(name) {
  return name.split('.').pop().toUpperCase().slice(0, 4);
}

function renderList() {
  fileList.innerHTML = '';
  files.forEach((f, i) => {
    const item = document.createElement('div');
    const stateClass = f.status === 'processing' ? ' is-processing' : f.status === 'done' ? ' is-done' : '';
    item.className = 'file-item' + stateClass;

    let statusHtml = '';
    if (f.status === 'pending') statusHtml = '<div class="file-status"><div class="status-pending"></div></div>';
    else if (f.status === 'processing') statusHtml = '<div class="file-status"><div class="status-processing"></div></div>';
    else if (f.status === 'done') statusHtml = '<div class="file-status"><div class="status-done">✓</div></div>';

    const newName = getNewName(i);
    const renameHtml = renameEnabled && newName
      ? `<span class="file-arrow">→</span><span class="file-newname">${newName}</span>`
      : '';

    item.innerHTML = `
      <span class="file-ext">${getOrigExt(f.file.name)}</span>
      <span class="file-name">${f.file.name}</span>
      ${renameHtml}
      <span class="file-size">${fmtSize(f.file.size)}</span>
      ${statusHtml}
    `;
    fileList.appendChild(item);
  });
  updatePreview();
}

function updateStats() {
  const done = files.filter(f => f.status === 'done').length;
  const n = files.length;
  if (n === 0) statsLabel.textContent = '0 images';
  else if (done > 0) statsLabel.textContent = `${done}/${n} converted`;
  else statsLabel.textContent = n === 1 ? '1 image' : `${n} images`;
  convertBtn.disabled = n === 0 || files.every(f => f.status === 'done');
}

function clearAll() {
  files = [];
  renderList();
  updateStats();
  progressWrap.style.display = 'none';
  progressFill.style.width = '0%';
  document.getElementById('fileInput').value = '';
}

async function startConvert() {
  const pending = files.filter(f => f.status === 'pending');
  if (!pending.length) return;
  convertBtn.disabled = true;
  progressWrap.style.display = 'block';
  let doneCount = files.filter(f => f.status === 'done').length;
  const zipEntries = [];

  for (let i = 0; i < pending.length; i++) {
    const item = pending[i];
    const globalIndex = files.indexOf(item);
    item.status = 'processing';
    renderList();

    await new Promise(resolve => {
      const img = new Image();
      const url = URL.createObjectURL(item.file);
      img.onload = () => {
        const canvas = document.createElement('canvas');
        let w = img.naturalWidth;
        let h = img.naturalHeight;
        if (resizeMode === 'maxw') {
          const maxW = parseInt(document.getElementById('maxWidth').value) || 1920;
          if (w > maxW) { h = Math.round(h * maxW / w); w = maxW; }
        } else if (resizeMode === '50') {
          w = Math.round(w * 0.5);
          h = Math.round(h * 0.5);
        }
        canvas.width = w;
        canvas.height = h;
        const ctx = canvas.getContext('2d');
        if (getMime() === 'image/jpeg') {
          ctx.fillStyle = '#ffffff';
          ctx.fillRect(0, 0, w, h);
        }
        ctx.drawImage(img, 0, 0, w, h);
        const q = getMime() === 'image/png' ? undefined : quality / 100;
        canvas.toBlob(blob => {
          URL.revokeObjectURL(url);
          const filename = renameEnabled
            ? getNewName(globalIndex)
            : item.file.name.replace(/\.[^.]+$/, '') + '.' + getExt();

          if (downloadMode === 'individual') {
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = filename;
            a.click();
          } else {
            zipEntries.push({ filename, blob });
          }

          item.status = 'done';
          doneCount++;
          progressFill.style.width = Math.round((doneCount / files.length) * 100) + '%';
          renderList();
          updateStats();
          setTimeout(resolve, 80);
        }, getMime(), q);
      };
      img.src = url;
    });
  }

  if (downloadMode === 'zip' && zipEntries.length > 0) {
    const zip = new JSZip();
    zipEntries.forEach(({ filename, blob }) => zip.file(filename, blob));
    const zipBlob = await zip.generateAsync({ type: 'blob' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(zipBlob);
    a.download = 'converted_images.zip';
    a.click();
  }

  convertBtn.disabled = files.every(f => f.status === 'done');
}

// Init
document.documentElement.lang = 'en';
updateSliderGradient();
</script>
